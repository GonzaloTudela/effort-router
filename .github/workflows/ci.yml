name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deterministic-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run verify
      - run: node scripts/profile.mjs . --output "$RUNNER_TEMP/profile.json"
      - run: node scripts/evaluate-promotion.mjs "$RUNNER_TEMP/profile.json" "$RUNNER_TEMP/promotion.json"